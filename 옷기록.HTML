<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARDROBE Ultimate V57 (Layout Overflow Fixed)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; }
        
        body { 
            --bg-main: #D1D5DB; 
            --bg-box: #F3F4F6; 
            --bg-input: #E5E7EB; 
            --bg-darker: #9CA3AF; 
            --color-point: #111827; 
            --text-main: #111827; 
            --text-sub: #374151; 
            --text-placeholder: #6B7280; 
            --border-main: #9CA3AF; 
            --border-dark: #6B7280; 
            font-family: 'Pretendard', sans-serif; margin: 0; display: flex; height: 100vh; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; position: relative; 
        }

        /* 💡 Research Tool Aesthetic Overrides */
        .sidebar, .form-container, .saved-record-container, .review-overlay, .global-fit-popup, .size-popup, .submit-btn, .fit-btn, .measure-chip, .size-select-btn, .floating-input-group input, .floating-input-group textarea, .search-measure-wrapper, .image-preview, select {
            border-radius: 8px !important;
        }
        .form-container, .saved-record-container, .global-fit-popup, .size-popup, .review-overlay {
            box-shadow: none !important;
            border: 1px solid var(--border-main) !important;
        }
        .sidebar { border-right: 1px solid var(--border-main) !important; box-shadow: none !important; }
        .submit-btn { border: 1px solid var(--color-point) !important; border-radius: 8px !important; box-shadow: none !important; }
        .submit-btn:hover { transform: none !important; background-color: #000000 !important; }
        .measure-chip:focus-within { transform: none !important; box-shadow: 0 0 0 1px var(--color-point) !important; }

        body, .sidebar, .content, .form-container, .login-box, .login-overlay, .sub-menu, .size-popup, .global-fit-popup,
        input, textarea, .measure-chip, .size-item, .fit-btn, .submit-btn, .size-select-btn,
        .menu-item, .sub-menu-item, .category-hero, .inline-fit-label, .fit-text, .val-text,
        .analysis-select, .analysis-result-title { transition: background-color 0.5s ease, color 0.5s ease, border-color 0.5s ease; }

        
        
        
        
        
        
        

        .sidebar { width: 200px; background-color: var(--bg-box); border-right: 1px solid var(--border-main); padding: 40px 0 0 0; display: flex; flex-direction: column; z-index: 50; flex-shrink: 0; position: relative; }
        .sidebar h2 { text-align: center; font-size: 14px; color: var(--text-sub); margin-bottom: 30px; letter-spacing: 3px; font-weight: 700; white-space: nowrap; }
        .menu-item { padding: 16px 20px; cursor: pointer; color: var(--text-sub); font-size: 15px; font-weight: 500; position: relative; white-space: nowrap; }
        .menu-item.active { font-weight: 800; color: var(--text-main); background-color: var(--bg-input); border-left: 3px solid var(--color-point); }
        .menu-item:hover { color: var(--text-main); background-color: var(--bg-input); }
        .sub-menu { display: flex; opacity: 0; visibility: hidden; transform: translateX(-10px); position: absolute; left: 100%; top: 0; width: 180px; background-color: var(--bg-box); border: 1px solid var(--border-main); border-left: 3px solid var(--color-point); flex-direction: column; border-radius: 0 12px 12px 0; z-index: 100; padding: 0; max-height: 80vh; overflow-y: auto; box-shadow: 5px 5px 20px rgba(0,0,0,0.2); }
        .menu-wrapper:hover .sub-menu { opacity: 1; visibility: visible; transform: translateX(0); }
        .sub-menu-item { padding: 12px 16px; font-size: 13px; color: var(--text-sub); cursor: pointer; border-bottom: 1px solid var(--border-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sub-menu-item:hover { background-color: var(--bg-input); color: var(--color-point); padding-left: 20px; }

        .backup-group { margin-top: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .backup-btn { background: none; border: 1px solid var(--border-main); color: var(--text-placeholder); font-size: 11px; padding: 8px; border-radius: 8px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .backup-btn:hover { border-color: var(--color-point); color: var(--color-point); }
        .logout-btn { background: none; border: none; color: var(--text-placeholder); cursor: pointer; font-size: 13px; font-weight: 600; padding: 15px 20px; text-align: left; white-space: nowrap; }
        .logout-btn:hover { color: #ef4444; }

        .content { flex-grow: 1; height: 100vh; overflow-y: auto; overflow-x: hidden; background-color: var(--bg-main); padding: 0 40px; scroll-behavior: smooth; position: relative; z-index: 10; }
        
        .category-section { padding-bottom: 40px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .section-divider { width: 100%; max-width: 844px; height: 2px; background: linear-gradient(90deg, transparent, var(--border-main), transparent); margin: 80px auto 0 auto; opacity: 0.5; }
        .category-hero { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 844px; padding: 40px 0 30px 0; font-size: 35px; font-weight: 700; color: var(--text-main); letter-spacing: -0.5px; scroll-margin-top: 40px; white-space: nowrap; }

        .form-container { background: var(--bg-box); padding: 30px; border-radius: 24px; border: none; margin-bottom: 30px; display: flex; flex-direction: column; width: 100%; max-width: 844px; min-width: 500px; position: relative; z-index: 2; transition: transform 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.1); zoom: 1.2; }
        
        .saved-record-container { 
            max-width: 1000px !important; 
            padding: 24px !important; 
            border-radius: 20px; 
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            scroll-margin-top: 40px; 
            position: relative; 
            z-index: 1; 
        }
        
        
        .layout-top-row { display: flex; gap: 24px; margin-bottom: 24px; width: 100%; flex-wrap: wrap; }
        .layout-top-row > * { flex: 1 1 120px; position: relative; min-width: 120px; }
        
        .layout-bottom-row { display: flex; gap: 20px; align-items: stretch; width: 100%; flex-wrap: wrap; }
        
        /* 💡 수정됨: margin-bottom 제거하고 right-col 자체에 gap:15px 부여하여 높이 충돌 방지 */
        .left-col { width: 180px; flex: 0 0 180px; display: flex; flex-direction: column; flex-shrink: 0; }
        .right-col { flex: 1 1 250px; display: flex; flex-direction: column; gap: 15px; min-width: 250px; }

        .saved-record-container .layout-bottom-row { gap: 16px; }

        .floating-input-group { position: relative; display: flex; align-items: center; width: 100%; }
        .floating-input-group input { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 18px; background: var(--bg-input); color: var(--text-main); font-family: inherit; transition: 0.3s; outline: none; }
        
        /* 💡 수정됨: 절대 위치(absolute)를 활용해 flex 렌더링 버그를 우회하여 무조건 100% 채우도록 수정 */
        .floating-input-group textarea { 
            width: 100%; 
            height: 100%;
            padding: 24px 16px 16px 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            background: var(--bg-input); 
            color: var(--text-main); 
            font-family: inherit; 
            transition: 0.3s; 
            outline: none; 
            resize: none; 
            min-height: 120px; 
            box-sizing: border-box; 
        }
        
        .saved-record-container .floating-input-group textarea { font-size: 15px; padding: 20px 12px 12px 12px; }
        
        .floating-input-group input:focus, .floating-input-group textarea:focus { box-shadow: 0 0 0 1.5px var(--color-point); }
        .search-measure-wrapper:focus-within { box-shadow: 0 0 0 1.5px var(--color-point); }

        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        
        .floating-input-group label { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-placeholder); pointer-events: none; transition: 0.2s ease all; font-weight: 600; font-size: 16px; white-space: nowrap; }
        
        .floating-input-group textarea + label { top: 34px; }
        .saved-record-container .floating-input-group textarea + label { top: 28px; font-size: 14px; }
        
        .floating-input-group input:focus + label, .floating-input-group input:not(:placeholder-shown) + label,

        input[type="number"] { -moz-appearance: textfield !important; appearance: none !important; }

        .measure-chip { flex: 1 1 0%; min-width: 65px; background: var(--bg-input); border: none; border-radius: 12px; padding: 12px 4px; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: 0.2s; }

        .chip-label { font-size: 12px; color: var(--text-sub); font-weight: 700; white-space: nowrap; }

        .measure-chip.saved-chip .chip-label { color: var(--text-main); opacity: 0.8; }
        .measure-chip.saved-chip .val-text { font-size: 18px; font-weight: 900; color: var(--color-point); margin: 2px 0; display: block; white-space: nowrap; }
        .saved-record-container .val-text { font-size: 16px; margin: 0px 0; }
        
        .measure-chip.saved-chip .fit-text { font-size: 11px; font-weight: 700; background: var(--bg-box); color: var(--color-point); padding: 4px 6px; border-radius: 6px; display: inline-block; white-space: nowrap; }
        .saved-record-container .fit-text { font-size: 10px; padding: 2px 5px; }

        .submit-btn-wrapper { display: flex; justify-content: flex-end; margin-top: 25px; }
        .submit-btn { background-color: var(--color-point); color: var(--bg-main); border: none; padding: 14px 36px; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 800; transition: transform 0.2s; white-space: nowrap; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .delete-btn-x { position: absolute; top: 9px; right: 16px; background: transparent; border: none; color: var(--text-placeholder); font-size: 28px; cursor: pointer; transition: color 0.2s; padding: 0; line-height: 1; }
        .delete-btn-x:hover { color: #ef4444; }
        .edit-btn-x { position: absolute; top: 15px; right: 45px; background: transparent; border: none; color: var(--text-placeholder); font-size: 14px; cursor: pointer; transition: color 0.2s; padding: 0; line-height: 1; display: flex; align-items: center; justify-content: center; }
        .edit-btn-x:hover { color: var(--color-point); }

        .global-fit-popup { display: none; position: fixed; background: var(--bg-box); border: none; padding: 19px 24px; border-radius: 19px; z-index: 9999; flex-direction: column; align-items: center; gap: 14px; width: max-content; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .fit-btn.selected { background: var(--color-point); color: var(--bg-main); font-weight: 900; }

        .size-popup.show { display: flex; }
        .size-item { flex: 1; padding: 12px 0; border: none; background: var(--bg-input); color: var(--text-sub); text-align: center; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 700; transition: 0.2s; white-space: nowrap; }
        .size-item:hover { background: var(--color-point); color: var(--bg-main); }

        .image-preview { width: 100%; aspect-ratio: 3 / 4; border: 1px solid var(--border-dark); border-radius: 16px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: pointer; transition: border-color 0.3s; flex-shrink: 0; }
        .saved-record-container .image-preview { border-radius: 12px; border: none; }
        
        .image-preview:hover { border-color: var(--color-point); }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; display: none; position: relative; }
        
        .highlight-match { border: 2px solid var(--color-point) !important; transform: scale(1.05); z-index: 2; }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(10px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        
        .record-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; width: 100%; max-width: 1200px; justify-items: center; margin: 0 auto; margin-top: -10px; }
        .record-list > .saved-record-container { margin-bottom: 0 !important; height: 100%; display: flex; flex-direction: column; width: 100%; box-sizing: border-box; }

                @media (max-width: 950px) {

            .left-col { width: 100% !important; flex: none; }

            .image-preview { min-height: 130px; }
            .saved-record-container .image-preview { min-height: 110px; }
            
            .measure-chip { min-width: 45%; }
            .record-list { grid-template-columns: 1fr; }
            #sec-search .form-container { flex-direction: column !important; }
            #sec-search .search-cat-item { display: inline-block; margin-right: 5px; }
            #sec-search div[style*="flex: 0 0 150px"] { border-right: none !important; border-bottom: 1px solid var(--border-main); padding-right: 0 !important; padding-bottom: 15px; flex-direction: row !important; overflow-x: auto; width: 100%; white-space: nowrap; flex: none !important; }

    </style>

<body>

    <div style="position: fixed; top: 20px; right: 40px; z-index: 1000; display: flex; align-items: center; background: var(--bg-box); border-radius: 8px; padding: 8px 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <input type="text" id="global-name-search" placeholder="옷 이름/브랜드 검색" style="border: none; background: transparent; font-size: 15px; font-family: inherit; color: var(--text-main); outline: none; width: 150px;" oninput="runGlobalNameSearch()">
    </div>


    <div id="global-fit-popup" class="global-fit-popup"><div class="fit-popup-title" style="font-weight:700; font-size:17px;">치수 어땠어요?</div><div class="fit-btn-group" id="fit-btn-group" style="display:flex; gap:10px;"></div></div>

    <aside class="sidebar" id="sidebar">
        <h2>WARDROBE</h2>
        <div class="menu-item" onclick="scrollToElement('sec-search-hero', 'start')" style="margin-top:auto; font-weight:700;">🔍 치수 비교</div>
        <div class="backup-group">
            <button class="backup-btn" onclick="exportData()">📦 데이터 파일로 백업</button>
            <button class="backup-btn" onclick="document.getElementById('import-file').click()">📂 백업 파일 불러오기</button>
            <input type="file" id="import-file" style="display:none" onchange="importData(event)">
        </div>
    </aside>

    <main class="content" id="main-content"></main>

    <script>

        const DB_NAME = 'WardrobeDB';
        const STORE_NAME = 'records';

        function getDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => {
                    const db = e.target.result;
                    if(!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function idbGet(key) {
            try {
                const db = await getDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const req = tx.objectStore(STORE_NAME).get(key);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            } catch(e) { return null; }
        }

        async function idbSet(key, val) {
            try {
                const db = await getDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const req = tx.objectStore(STORE_NAME).put(val, key);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            } catch(e) { console.error("IDB Save Error:", e); }
        }

        let currentUserKey = null;
        let userData = []; 
        let activeMeasureInput = null;

        
        window.runGlobalNameSearch = function() {
            const query = document.getElementById('global-name-search').value.toLowerCase();
            document.querySelectorAll('.record-list .saved-record-container').forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(query) ? 'flex' : 'none';
            });
        };

        
        window.triggerPaste = async function(btn) {
            try {
                const items = await navigator.clipboard.read();
                for (const item of items) {
                    if (item.types.includes('image/png') || item.types.includes('image/jpeg')) {
                        const blob = await item.getType(item.types.find(t => t.startsWith('image/')));
                        const file = new File([blob], "pasted.png", {type: blob.type});
                        const input = btn.closest('.left-col').querySelector('.image-input');
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(file);
                        input.files = dataTransfer.files;
                        previewImage(input);
                        return;
                    }
                }
                alert('클립보드에 이미지가 없습니다!');
            } catch (err) {
                alert('붙여넣기 권한이 없거나 지원되지 않습니다. 이미지 박스에 마우스를 올리고 Ctrl+V 를 눌러보세요.');
            }
        };

        document.addEventListener('paste', e => {
            const items = e.clipboardData.items;
            let imageItem = null;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    imageItem = items[i];
                    break;
                }
            }
            if (imageItem) {
                const file = imageItem.getAsFile();
                
                // Find which category section is currently visible on the screen
                const sections = document.querySelectorAll('.category-section');
                let targetInput = null;
                
                // Usually the user hovers over or is interacting with a specific section

        window.addEventListener('DOMContentLoaded', async () => {
            currentUserKey = 'wardrobe_default_user';
            let mergedData = [];
            let oldKeys = [];
            
            // 1. Read from IndexedDB FIRST (This is the newest data)
            try {
                const idbDataStr = await idbGet(currentUserKey);
                if (idbDataStr) {
                    const idbData = JSON.parse(idbDataStr);
                    if (Array.isArray(idbData)) {
                        mergedData = mergedData.concat(idbData);
                    }
                }
            } catch(e) {}

            // 2. Read from localStorage for migration (Old data)
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('wardrobe_') && key !== 'wardrobe_active_user' && key !== 'wardrobe_default_user') {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (Array.isArray(data)) {
                            mergedData = mergedData.concat(data);
                            oldKeys.push(key);
                        }
                    } catch(e) {}
                }
            }
            
            try {
                const currentData = JSON.parse(localStorage.getItem(currentUserKey));
                if (Array.isArray(currentData)) {
                    mergedData = mergedData.concat(currentData);
                    oldKeys.push(currentUserKey);
                }
            } catch(e) {}
            
            // 3. Deduplicate
            const uniqueData = [];
            const seenIds = new Set();
            mergedData.forEach(item => {
                if (!seenIds.has(item.id)) {
                    seenIds.add(item.id);
                    uniqueData.push(item);
                }
            });
            
            userData = uniqueData;
            
            // 4. Save safely to IndexedDB
            await idbSet(currentUserKey, JSON.stringify(userData));
            
            // 5. Cleanup localStorage to free quota!
            oldKeys.forEach(k => localStorage.removeItem(k));
            
            renderRecords();
        });

        window.runSearch = function() {
            if(!activeSearchCat) return;

            });

            const inputs = Array.from(document.querySelectorAll('.search-measure-val')).filter(i => i.value !== '');
            if(inputs.length === 0) return;
            
            const renderMiniCard = (r) => `
                <div style="padding: 10px; margin:0; width:100%; display:flex; gap:10px; cursor:pointer; background: var(--bg-box); min-width: 0; border-radius: 8px; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" onmouseenter="showPreviewCard('${r.id}', event)" onmouseleave="hidePreviewCard()" onclick="scrollToElement('${r.id}', 'center')">

                        <div style="display:flex; flex-direction:column; justify-content:center; margin-bottom: 8px;">

                            <div style="font-size: 13px; font-weight: 700; color: var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width: 100%;">${r.name}</div>
                        </div>
                        <div style="display:flex; justify-content:flex-end; align-items:center; width:100%; border-top: ${r.measures.length === 4 ? 'none' : '1px dashed var(--border-dark)'}; padding-top: 6px; gap: 8px;">
                            <div style="font-size: 11px; font-weight: 600; color: var(--text-sub); white-space:nowrap;">${r.matchLabel} 기준</div>
                            <div style="font-size: 16px; font-weight: 900; color: var(--color-point); flex-shrink: 0;">${r.searchVal}</div>
                            ${r.fitRating ? `<div style="font-size: 10px; padding: 2px 5px; background: var(--bg-main); color: var(--text-main); border-radius: 4px; font-weight: 700; white-space:nowrap;">${r.fitRating}</div>` : ''}
                        </div>
                    </div>
                </div>`;

            inputs.forEach(activeInput => {
                const measureLabel = activeInput.dataset.label;
                const inputVal = parseFloat(activeInput.value);
                
                const matches = userData.filter(d => d.catId === activeSearchCat).map(record => {
                    const m = record.measures.find(x => x.label === measureLabel);
                    return m && m.value ? { ...record, searchVal: parseFloat(m.value), matchLabel: measureLabel, inputVal: inputVal, fitRating: m.fitRating } : null;
                }).filter(Boolean);
                
                // For UP, we want the largest furthest away (at the top), so sort descending.
                const upMatches = matches.filter(r => r.searchVal >= inputVal).sort((a,b) => b.searchVal - a.searchVal);
                // For DOWN, we want the smallest furthest away (at the bottom), so sort descending.
                // Wait! If we sort descending for downMatches, the largest is at the top (closest to input). This is correct!
                const downMatches = matches.filter(r => r.searchVal < inputVal).sort((a,b) => b.searchVal - a.searchVal);
                
                const upCol = document.getElementById('up-col-' + measureLabel);
                const downCol = document.getElementById('down-col-' + measureLabel);
                
                upMatches.forEach(r => {
                    const el = document.createElement('div');
                    el.innerHTML = renderMiniCard(r);
                    upCol.appendChild(el.firstElementChild);
                });
                downMatches.forEach(r => {
                    const el = document.createElement('div');
                    el.innerHTML = renderMiniCard(r);
                    downCol.appendChild(el.firstElementChild);
                });
            });
        }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(confirm(`${imported.length}개의 데이터를 불러오시겠습니까? 현재 데이터와 합쳐집니다.`)) {
                        userData = [...userData, ...imported];
                        idbSet(currentUserKey, JSON.stringify(userData));
                        location.reload();
                    }
                } catch(err) { alert('올바른 백업 파일이 아닙니다.'); }
            };
            reader.readAsText(file);
        }

        function generateSizePopupHtml() { return [['S','M','L','XL'],['0','1','2','3'],['95','100','105','110'],['44','46','48','50','52']].map(r => `<div style="display:flex; gap:6px;">${r.map(s => `<div class="size-item" onclick="selectSize(this, '${s}')">${s}</div>`).join('')}</div>`).join('') + `<div style="margin-top:4px; display:flex; gap:6px;"><div class="size-item" style="background:var(--color-point); color:var(--bg-main);" onclick="this.style.display='none'; this.nextElementSibling.style.display='block'; this.nextElementSibling.focus();">직접 입력</div><input type="text" style="display:none; width:100%; padding:10px; border:1px solid var(--color-point); border-radius:8px; outline:none; background:var(--bg-input); color:var(--text-main); font-weight:700; text-align:center;" onkeypress="if(event.key==='Enter') selectSize(this, this.value)"></div>`; }
        function selectSize(el, s) { const p = el.closest('.size-popup'); p.previousElementSibling.innerText = s; p.previousElementSibling.style.color = 'var(--text-main)'; p.previousElementSibling.style.opacity = '1'; p.nextElementSibling.value = s; p.classList.remove('show'); }
        
        function showFitPopup(inputEl) {
            document.querySelectorAll('.size-popup').forEach(p => p.classList.remove('show'));
            activeMeasureInput = inputEl;
            const popup = document.getElementById('global-fit-popup');
            const label = inputEl.dataset.label;
            
            let btnsHtml = '';
            for(let i=1; i<=7; i++) {
                let subLabel = '';
                if(['총장','밑위','소매길이'].includes(label)) {
                    if(i===1) subLabel = '너무 짧음';
                    if(i===2||i===3) subLabel = '조금 짧음';
                    if(i===4) subLabel = '적당함';
                    if(i===5||i===6) subLabel = '조금 김';
                    if(i===7) subLabel = '너무 김';
                } else if(label === '허벅지단면' || label === '밑단단면') {
                    if(i===1) subLabel = '너무 좁음';
                    if(i===2||i===3) subLabel = '조금 좁음';
                    if(i===4) subLabel = '적당함';
                    if(i===5||i===6) subLabel = '조금 넓음';
                    if(i===7) subLabel = '너무 넓음';
                } else {
                    if(i===1) subLabel = '너무 작음';
                    if(i===2||i===3) subLabel = '조금 작음';
                    if(i===4) subLabel = '적당함';
                    if(i===5||i===6) subLabel = '조금 큼';
                    if(i===7) subLabel = '너무 큼';
                }
                btnsHtml += `<div style="display:flex; flex-direction:column; align-items:center; gap:4px;">
                    <button type="button" class="fit-btn" style="width:34px; height:34px; padding:0; display:flex; align-items:center; justify-content:center; border-radius:8px; border:1px solid var(--border-main); background:var(--bg-input); font-weight:700; cursor:pointer; color:var(--text-main);" onclick="selectFitValue(this)">${i}</button>
                    <span style="font-size:10px; color:var(--text-sub); white-space:nowrap; opacity:${[1,4,7].includes(i) ? '1' : '0'};">${subLabel}</span>
                </div>`;
            }
            document.getElementById('fit-btn-group').innerHTML = btnsHtml;
            const r = inputEl.getBoundingClientRect();
            popup.style.top = (r.bottom + 10) + 'px'; 
            popup.style.left = (r.left + (r.width/2) - 170) + 'px'; 
            popup.classList.add('show');
        }
        
        function selectFitValue(btn) { 
            const textValue = btn.nextElementSibling.innerText;
            activeMeasureInput.dataset.fitRating = textValue; 
            activeMeasureInput.nextElementSibling.innerText = textValue; 
            document.getElementById('global-fit-popup').classList.remove('show'); 
        }
        
        function deleteRecord(id, btn) { 
            userData = userData.filter(u => u.id !== id); 
            idbSet(currentUserKey, JSON.stringify(userData)); 
            
            const card = btn.closest('.saved-record-container');
            card.style.transition = 'all 0.3s ease';
            card.style.opacity = '0';
            card.style.transform = 'scale(0.9)';
            
            const menuItem = document.getElementById('menuitem-' + id);
            if(menuItem) menuItem.remove();
            
            setTimeout(() => card.remove(), 300);
        }
        
        function scrollToElement(id, pos) { const el = document.getElementById(id); if(el) el.scrollIntoView({ behavior:'smooth', block:pos }); }
        function togglePopup(btn) { document.getElementById('global-fit-popup').classList.remove('show'); btn.nextElementSibling.classList.toggle('show'); }
        function previewImage(i) {
            if(i.files && i.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 500;
                        let width = img.width;
                        let height = img.height;
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                        
                        i.previousElementSibling.querySelector('img').src = dataUrl;
                        i.previousElementSibling.querySelector('img').style.display = 'block';
                        i.previousElementSibling.firstElementChild.style.display = 'none';
                        i.dataset.imgData = dataUrl;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(i.files[0]);
            }
        }
        document.addEventListener('click', e => { 
            if(!e.target.closest('.global-fit-popup') && !e.target.classList.contains('measure-input') && !e.target.classList.contains('fit-text')) {
                document.getElementById('global-fit-popup').classList.remove('show'); 
            }
            if(!e.target.closest('.size-popup') && !e.target.classList.contains('size-select-btn')) {
                document.querySelectorAll('.size-popup').forEach(p=>p.classList.remove('show')); 
            }
        });

        document.getElementById('main-content').addEventListener('scroll', () => {
            const popup = document.getElementById('global-fit-popup');
            if (popup.classList.contains('show') && activeMeasureInput) {
                const r = activeMeasureInput.getBoundingClientRect();
                popup.style.top = (r.bottom + 10) + 'px';
                popup.style.left = (r.left + (r.width/2) - 150) + 'px';
            }
        });
    
        window.updateReview = function(id, val) {
            const r = userData.find(u => u.id === id);
            if(r) { r.review = val; idbSet(currentUserKey, JSON.stringify(userData)); }
        };

        function toggleEditRecord(id, btn) {
            const card = document.getElementById(id);
            if (!card) return;
            const r = userData.find(u => u.id === id);
            if (!r) return;

            if (!card.classList.contains('editing-mode')) {
                btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                card.classList.add('editing-mode');
                
                const titleDiv = card.querySelector('div[style*="font-size:22px"]') || card.querySelector('div[style*="font-size: 22px"]');
                if (titleDiv) {
                    titleDiv.innerHTML = `
                        <input type="text" class="edit-brand" placeholder="브랜드" value="${r.brand || ''}" style="width:80px; padding:4px; font-size:16px; border-radius:4px; border:1px solid var(--border-main); background:var(--bg-input);">
                        <input type="text" class="edit-name" placeholder="옷 이름" value="${r.name}" style="width:140px; padding:4px; font-size:18px; border-radius:4px; border:1px solid var(--border-main); background:var(--bg-input);">
                        <input type="text" class="edit-size" placeholder="사이즈" value="${r.size}" style="width:60px; padding:4px; font-size:14px; border-radius:4px; border:1px solid var(--border-main); background:var(--bg-input);">
                    `;
                }

                const measureChips = card.querySelectorAll('.measure-chip');
                measureChips.forEach(chip => {
                    const labelSpan = chip.querySelector('.chip-label');
                    if(!labelSpan) return;
                    const label = labelSpan.innerText;
                    const m = r.measures.find(x => x.label === label);
                    if(m) {
                        chip.innerHTML = `
                            <span class="chip-label" style="font-size:12px; font-weight:600; color:var(--text-sub);">${label}</span>
                            <input type="number" class="edit-measure-val" data-label="${label}" data-fit-rating="${m.fitRating || ''}" value="${m.value}" style="width:90%; text-align:center; padding:2px; font-size:18px; font-weight:700; border-radius:4px; border:1px solid var(--border-main); color:var(--color-point); background:var(--bg-input); margin-top:2px;">
                            <span class="fit-text" style="font-size:12px; margin-top:4px; font-weight:600; color:var(--text-sub); cursor:pointer; text-decoration:underline;" onclick="showFitPopup(this.previousElementSibling)">${m.fitRating || '핏 선택'}</span>
                        `;
                    }
                });
            } else {
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>';
                card.classList.remove('editing-mode');
                
                const b = card.querySelector('.edit-brand');
                if(b) r.brand = b.value;
                const n = card.querySelector('.edit-name');
                if(n) r.name = n.value;
                const s = card.querySelector('.edit-size');
                if(s) r.size = s.value;

                const inputs = card.querySelectorAll('.edit-measure-val');
                inputs.forEach(inp => {
                    const m = r.measures.find(x => x.label === inp.dataset.label);
                    if(m) {
                        m.value = inp.value;
                        m.fitRating = inp.dataset.fitRating || '';
                    }
                });

                idbSet(currentUserKey, JSON.stringify(userData));
                
                // Re-render everything to update the card properly
                renderRecords();
            }
        }
        function showPreviewCard(id, event) {
            const originalCard = document.getElementById(id);
            if (!originalCard) return;
            const container = document.getElementById('hover-preview-container');
            if (!container) return;
            
            container.innerHTML = '';
            const clone = originalCard.cloneNode(true);
            clone.id = id + '-preview';
            clone.style.margin = '0';
            clone.style.boxShadow = 'none';
            clone.classList.remove('editing-mode');
            
            const btns = clone.querySelectorAll('.edit-btn-x, .delete-btn-x');
            btns.forEach(b => b.style.display = 'none');
            
            container.appendChild(clone);
            container.style.display = 'block';
            
            const rect = event.currentTarget.getBoundingClientRect();
            let topPos = rect.top;
            let leftPos = rect.right + 8;
            
            const popupWidth = 520;
            if (leftPos + popupWidth > window.innerWidth) {
                leftPos = rect.left - popupWidth - 8;
            }
            if (leftPos < 10) leftPos = 10;
            
            const popupHeight = container.offsetHeight || 300;
            if (topPos + popupHeight > window.innerHeight) {
                topPos = window.innerHeight - popupHeight - 10;
            }
            if (topPos < 10) topPos = 10;
            
            container.style.top = topPos + 'px';
            container.style.left = leftPos + 'px';
            container.style.opacity = '1';
        }

        function hidePreviewCard() {
            const container = document.getElementById('hover-preview-container');
            if (container) container.style.display = 'none';
        }
</script>
<div id="hover-preview-container" style="display:none; position:fixed; z-index:99999; pointer-events:none; box-shadow:0 15px 40px rgba(0,0,0,0.4); border-radius:8px; margin: 0; width: 520px; background: transparent;"></div>
